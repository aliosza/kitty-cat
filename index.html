<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Tabby Cat</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f0f0f0;
  margin: 0;
  overflow: hidden;
}

/* CAT BASE */
.cat {
  position: relative;
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s;
  box-shadow: 
    -10px -10px 0 -5px orange inset,
    10px 10px 0 -5px brown inset,
    0 -10px 0 -5px black inset;
}

/* EARS */
.cat::before,
.cat::after {
  content: '';
  position: absolute;
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
  top: -20px;
  transform: rotate(45deg);
}
.cat::before { left: -10px; }
.cat::after { right: -10px; }

/* TAIL */
.tail {
  position: absolute;
  width: 20px;
  height: 80px;
  background: linear-gradient(to bottom, orange 30%, brown 30%, black 50%);
  border-radius: 20px;
  top: 60px;
  left: 100px;
  transform-origin: top center;
  transform: rotate(20deg);
  transition: transform 0.3s;
}

/* EYES */
.eye {
  position: absolute;
  width: 15px;
  height: 15px;
  background: black;
  border-radius: 50%;
  top: 40px;
}
.eye.left { left: 35px; }
.eye.right { right: 35px; }

/* NOSE */
.nose {
  position: absolute;
  width: 10px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
}

/* MOUTH */
.mouth {
  position: absolute;
  width: 30px;
  height: 5px;
  border-radius: 50%;
  border-bottom: 2px solid black;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
}

/* SPOTS (tabby) */
.spot {
  position: absolute;
  width: 15px;
  height: 15px;
  background: orange;
  border-radius: 50%;
}
.spot1 { top: 20px; left: 20px; }
.spot2 { top: 30px; right: 25px; }
.spot3 { top: 60px; left: 50px; }

/* HOVER: wiggle ears */
.wiggle-ears::before { animation: wiggle 0.3s infinite; }
.wiggle-ears::after { animation: wiggle 0.3s infinite; }
@keyframes wiggle {
  0% { transform: rotate(45deg); }
  50% { transform: rotate(30deg); }
  100% { transform: rotate(45deg); }
}

/* HEARTS */
.heart {
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  clip-path: polygon(50% 0%, 61% 10%, 70% 20%, 70% 40%, 50% 60%, 30% 40%, 30% 20%, 39% 10%);
  animation: explode 0.8s forwards;
}
@keyframes explode {
  0% { transform: scale(0) translate(0,0); opacity: 1; }
  100% { transform: scale(1.5) translate(var(--x), var(--y)); opacity: 0; }
}

/* THANKS MESSAGE */
#thanks {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.2);
  font-weight: bold;
  color: black;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  width: 0;
  font-size: 2vw;
  transition: transform 5s ease-out, opacity 5s ease-out, width 5s ease-out, font-size 5s ease-out;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="cat" id="cat">
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="nose"></div>
  <div class="mouth"></div>
  <div class="spot spot1"></div>
  <div class="spot spot2"></div>
  <div class="spot spot3"></div>
  <div class="tail"></div>
</div>

<div id="thanks">Thank you for petting the kitty!!</div>

<script>
const cat = document.getElementById('cat');
const thanks = document.getElementById('thanks');

// Hover: ears wiggle
cat.addEventListener('mouseenter', () => cat.classList.add('wiggle-ears'));
cat.addEventListener('mouseleave', () => cat.classList.remove('wiggle-ears'));

// Click: purr + hearts + show message
cat.addEventListener('click', () => {
  if (navigator.vibrate) navigator.vibrate(50);

  // Create hearts
  for (let i = 0; i < 8; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.setProperty('--x', `${Math.random()*100-50}px`);
    heart.style.setProperty('--y', `${Math.random()*-100}px`);
    cat.appendChild(heart);
    setTimeout(() => heart.remove(), 800);
  }

  // Show thanks message gradually
  thanks.style.opacity = 1;
  thanks.style.transform = 'translate(-50%, -50%) scale(1)';
  thanks.style.width = '72vw';       // grow width
  thanks.style.fontSize = '8vw';     // grow font size
});
</script>

</body>
</html>
