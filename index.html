<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet the Kitty</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

#catButton{
  position:relative;
  cursor:pointer;
  text-align:center;
  font-weight:bold;
  color:#000;
  user-select:none;
}

.pixelCat{
  width:160px;
  height:140px;
  background:#c68642;
  clip-path:polygon(
    20% 0%, 35% 20%, 65% 20%, 80% 0%,
    100% 35%, 100% 80%, 80% 100%,
    20% 100%, 0% 80%, 0% 35%
  );
  image-rendering: pixelated;
  border:6px solid #000;
}

.tabby{
  background:
    repeating-linear-gradient(
      90deg,
      #c68642 0px,
      #c68642 10px,
      #8b5a2b 10px,
      #8b5a2b 16px
    );
}

#buttonText{
  position:absolute;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
}

.smallCat{
  position:absolute;
  pointer-events:none;
}

#thanks{
  position:absolute;
  font-size:40px;
  color:black;
  display:none;
  text-align:center;
}
</style>
</head>

<body>

<div id="catButton">
  <div class="pixelCat tabby"></div>
  <div id="buttonText">click here to pet the kitty</div>
</div>

<div id="thanks">thank you for petting the kitty!!</div>

<script>
const button = document.getElementById("catButton");
const thanks = document.getElementById("thanks");

button.addEventListener("click", () => {

  const rect = button.getBoundingClientRect();
  button.style.visibility="hidden";

  for(let i=0;i<120;i++){
    const cat=document.createElement("div");
    cat.classList.add("pixelCat","tabby","smallCat");

    let size=Math.random()*60+10;
    cat.style.width=size+"px";
    cat.style.height=size*0.85+"px";

    cat.style.left=rect.left+rect.width/2+"px";
    cat.style.top=rect.top+rect.height/2+"px";

    document.body.appendChild(cat);

    let angle=Math.random()*2*Math.PI;
    let distance=Math.random()*300;

    cat.animate([
      {transform:"translate(-50%,-50%) scale(1)",opacity:1},
      {transform:`translate(${Math.cos(angle)*distance}px,${Math.sin(angle)*distance}px) scale(0.2)`,opacity:0}
    ],{
      duration:1500+Math.random()*800,
      easing:"ease-out",
      fill:"forwards"
    });

    setTimeout(()=>cat.remove(),2000);
  }

  setTimeout(()=>{
    thanks.style.display="block";
  },1800);

});
</script>

</body>
</html>
