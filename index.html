<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet the Kitty</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:white;
font-family:"Press Start 2P", monospace;
overflow:hidden;
}

/* PIXEL CAT */

.pixelCat{
width:16px;
height:16px;
background:#ffffff;
image-rendering:pixelated;
transform:scale(10);
cursor:pointer;

box-shadow:

3px 0 #000,
4px 0 #d18b2c,
11px 0 #d18b2c,
12px 0 #000,

2px 1px #000,
3px 1px #fff,
4px 1px #d18b2c,
5px 1px #fff,
6px 1px #fff,
7px 1px #fff,
8px 1px #fff,
9px 1px #fff,
10px 1px #d18b2c,
11px 1px #fff,
12px 1px #000,

2px 2px #000,
12px 2px #000,

5px 5px #000,
9px 5px #000,

7px 7px #ffb6c1,

6px 8px #000,
8px 8px #000,

4px 3px #6a3f1a,
10px 3px #6a3f1a,
7px 3px #6a3f1a;

transition:transform .2s;
}

.pixelCat:hover{
animation:wiggle .35s infinite alternate;
}

@keyframes wiggle{
0%{transform:scale(10) rotate(-2deg);}
100%{transform:scale(10) rotate(2deg);}
}

/* PET TEXT */

#petText{
margin-top:30px;
font-size:12px;
text-align:center;
animation:blink 1s infinite;
}

@keyframes blink{
0%{color:#c71585;}
50%{color:#000;}
100%{color:#c71585;}
}

/* PARTICLES */

.particle{
position:absolute;
pointer-events:none;
}

/* HEART */

.heart{
width:14px;
height:14px;
background:#ff1493;
clip-path:polygon(
50% 90%,
0% 45%,
20% 10%,
50% 30%,
80% 10%,
100% 45%
);
}

/* THANK YOU MESSAGE */

#thanks{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.2);
opacity:0;
text-align:center;
line-height:1.6;
max-width:72vw;
transition:transform 6s ease-out, opacity 2s ease-out;
}

</style>
</head>

<body>

<div class="pixelCat" id="cat"></div>

<div id="petText">
click here<br>
to pet<br>
the kitty
</div>

<div id="thanks">
thank you<br>
for petting<br>
the kitty!!
</div>

<script>

const cat=document.getElementById("cat");
const thanks=document.getElementById("thanks");

cat.addEventListener("click",()=>{

if(navigator.vibrate) navigator.vibrate(60);

setTimeout(()=>{
thanks.style.opacity=1;
thanks.style.transform="translate(-50%,-50%) scale(1.6)";
},1500);

const rect=cat.getBoundingClientRect();

for(let i=0;i<120;i++){

let p=document.createElement("div");
p.classList.add("particle","heart");

p.style.left=rect.left+rect.width/2+"px";
p.style.top=rect.top+rect.height/2+"px";

document.body.appendChild(p);

let angle=Math.random()*2*Math.PI;
let distance=Math.random()*600+200;

p.animate(
[
{transform:"translate(-50%,-50%) scale(1)",opacity:1},
{transform:`translate(${Math.cos(angle)*distance}px,${Math.sin(angle)*distance}px) scale(.4)`,opacity:0}
],
{
duration:6000,
easing:"ease-out",
fill:"forwards"
}
);

setTimeout(()=>p.remove(),6000);

}

});

</script>

</body>
</html>
