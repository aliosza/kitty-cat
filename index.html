<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet the Kitty</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-family:monospace;
overflow:hidden;
}

/* MAIN BUTTON */

#catButton{
position:relative;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* PIXEL CAT */

.pixelCat{
width:160px;
height:160px;

background:
linear-gradient(#fff,#fff),
repeating-linear-gradient(
90deg,
#fff 0px,
#fff 10px,
#d18b2c 10px,
#d18b2c 14px,
#6a3f1a 14px,
#6a3f1a 18px,
#000 18px,
#000 20px
);

background-blend-mode:normal;

clip-path:polygon(
20% 0%,30% 20%,40% 10%,50% 20%,60% 10%,70% 20%,80% 0%,
100% 30%,100% 80%,80% 100%,20% 100%,0% 80%,0% 30%
);

border:6px solid black;

image-rendering:pixelated;
}

/* BUTTON TEXT */

#buttonText{
position:absolute;
text-align:center;
font-weight:bold;
font-size:16px;
line-height:1.4;
}

/* SMALL PARTICLES */

.particle{
position:absolute;
pointer-events:none;
image-rendering:pixelated;
}

/* SMALL CAT */

.smallCat{
width:30px;
height:30px;
background:
repeating-linear-gradient(
90deg,
#fff 0px,
#fff 6px,
#d18b2c 6px,
#d18b2c 9px,
#6a3f1a 9px,
#6a3f1a 12px,
#000 12px,
#000 14px
);
border:2px solid black;
}

/* PIXEL HEARTS */

.heart{
width:24px;
height:24px;
background:#ff69b4;
clip-path:polygon(
50% 90%,
0% 45%,
20% 10%,
50% 30%,
80% 10%,
100% 45%
);
}

.heart.dark{
background:#ff1493;
}

/* FINAL TEXT */

#thanks{
position:absolute;
font-size:42px;
font-weight:bold;
color:black;
display:none;
text-align:center;
}

</style>
</head>

<body>

<div id="catButton">
<div class="pixelCat"></div>

<div id="buttonText">
click here<br>
to pet<br>
the kitty
</div>
</div>

<div id="thanks">
thank you Sara for petting the kitty!!
</div>

<script>

const button=document.getElementById("catButton");
const thanks=document.getElementById("thanks");

button.addEventListener("click",()=>{

const rect=button.getBoundingClientRect();

button.style.visibility="hidden";

/* create particles */

for(let i=0;i<300;i++){

let p=document.createElement("div");

p.classList.add("particle");

/* random cat or heart */

if(Math.random()<0.6){
p.classList.add("smallCat");
}else{
p.classList.add("heart");
if(Math.random()<0.5)p.classList.add("dark");
}

p.style.left=rect.left+rect.width/2+"px";
p.style.top=rect.top+rect.height/2+"px";

document.body.appendChild(p);

let angle=Math.random()*2*Math.PI;
let distance=Math.random()*600;

p.animate(
[
{transform:"translate(-50%,-50%) scale(1)",opacity:1},
{transform:`translate(${Math.cos(angle)*distance}px,${Math.sin(angle)*distance}px) scale(0.1)`,opacity:0}
],
{
duration:10000,
easing:"ease-out",
fill:"forwards"
}
);

setTimeout(()=>p.remove(),10000);

}

setTimeout(()=>{
thanks.style.display="block";
},10000);

});

</script>

</body>
</html>
